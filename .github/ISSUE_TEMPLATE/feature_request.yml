name: Feature Request
description: Suggest an enhancement, new analysis, or additional jurisdiction
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
      placeholder: e.g., Add RVI chart for additional states, integrate HUD FMR API v2, add SNAP overlap analysis...
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Who would benefit and how?
      placeholder: e.g., Journalists covering state budget hearings would use this to...
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true
